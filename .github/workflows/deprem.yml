name: Daily Earthquake Analysis

on:
  schedule:
    - cron: '0 0 * * *' # Her gün gece yarısı çalışır (İhtiyaca göre değiştirilebilir)
  workflow_dispatch: # Manuel tetikleme için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Tüm geçmişi çekmek rebase hatalarını azaltır

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Analysis Script
        run: python DTS_66_AFAD_LIVE.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Değişen dosyaları ekle
          git add -A docs/
          git add earthquakes_3_5_plus_scientific_v5.db
          git add deprem_analiz_raporu_sade.html deprem_haritasi_tip.html deprem_haritasi_olasilik.html 2>/dev/null || true
          git add molchan_xgb.png molchan_rf.png 2>/dev/null || true
          git add foreshock_sensitivity_analysis.csv sensitivity_analysis.png 2>/dev/null || true
          
          # 2. Değişiklik kontrolü ve Commit
          if git diff --staged --quiet; then
            echo "Değişiklik yok, işlem atlanıyor."
          else
            git commit -m "Otomatik veri ve analiz güncellemesi [skip ci]"
            
            # 3. Güvenli Push Döngüsü (Hata aldığın kısım düzeltildi)
            for i in 1 2 3; do
              echo "Push denemesi $i..."
              # Önce commit yapıldığı için rebase artık hata vermez
              git pull --rebase origin main
              
              if git push origin main; then
                echo "Başarıyla güncellendi."
                exit 0
              fi
              
              echo "Push başarısız, 10 saniye bekleniyor..."
              sleep 10
            done
            
            echo "3 deneme sonunda push yapılamadı."
            exit 1
          fi
